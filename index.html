<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Nama Interaktif WebAR</title>
    
    <!-- Link Font Google (Outfit & Plus Jakarta Sans) untuk Tampilan Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Framework A-Frame (Versi stabil untuk AR.js) -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    
    <!-- Framework AR.js untuk A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- File CSS Kustom -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="margin: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif;">

    <!-- Scene AR.js -->
    <!-- 
      embedded: Memungkinkan scene berada di dalam layout HTML.
      arjs: Konfigurasi sumber webcam dan menghilangkan debug UI bawaan AR.js agar lebih bersih.
      vr-mode-ui: Dinonaktifkan karena kita menggunakan AR genggam/webcam, bukan VR headset.
    -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; precision: medium; antialias: true;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">
        

        <!-- Custom Marker -->
        <!-- 
          type="pattern": Menggunakan pattern marker khusus (.patt).
          url="pattern-pening.patt": Mengarah ke file marker kustom di root proyek.
          id="custom-marker": Digunakan oleh JS untuk mendeteksi event markerFound/markerLost.
        -->
        <a-marker type="pattern" url="pattern-pening.patt" id="custom-marker">
            
            <!-- Grup Konten AR (Melayang Bersama secara Elegan) -->
            <!-- 
              position: Posisi awal melayang di atas marker.
              rotation: Kemiringan -60 derajat di sumbu X agar miring menghadap kamera user.
              animation: Animasi melayang (levitasi) naik-turun secara serentak.
            -->
            <a-entity 
                id="ar-content"
                position="0 0.6 0" 
                rotation="-60 0 0"
                animation="property: position; to: 0 0.66 0; dir: alternate; loop: true; dur: 2500; easing: easeInOutSine">

                <!-- Gambar Biodata Utama -->
                <a-image 
                    src="biodata.png" 
                    width="3.4" 
                    height="1.6" 
                    position="0 0 0"
                    material="alphaTest: 0.5">
                </a-image>

                <!-- === TOMBOL TAUTAN INTERAKTIF === -->

                <!-- Tombol 1: PORTFOLIO -->
                <!-- Border Putih di Belakang -->
                <a-plane width="0.94" height="0.32" color="#ffffff" position="-1.05 -1.05 0.005"></a-plane>
                <!-- Tombol Utama -->
                <a-plane 
                    class="clickable" 
                    id="btn-portfolio" 
                    data-url="https://www.frmshbi.dev/" 
                    width="0.9" 
                    height="0.28" 
                    color="#ff0022" 
                    position="-1.05 -1.05 0.01">
                </a-plane>
                <a-text 
                    value="PORTFOLIO" 
                    align="center" 
                    width="2.3" 
                    color="#ffffff" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json" 
                    position="-1.05 -1.05 0.02"
                    class="clickable"
                    data-url="https://www.frmshbi.dev/">
                </a-text>

                <!-- Tombol 2: GITHUB -->
                <!-- Border Putih di Belakang -->
                <a-plane width="0.94" height="0.32" color="#ffffff" position="0 -1.05 0.005"></a-plane>
                <!-- Tombol Utama -->
                <a-plane 
                    class="clickable" 
                    id="btn-github" 
                    data-url="https://github.com/firmashabibii" 
                    width="0.9" 
                    height="0.28" 
                    color="#ff0022" 
                    position="0 -1.05 0.01">
                </a-plane>
                <a-text 
                    value="GITHUB" 
                    align="center" 
                    width="2.3" 
                    color="#ffffff" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json" 
                    position="0 -1.05 0.02"
                    class="clickable"
                    data-url="https://github.com/firmashabibii">
                </a-text>

                <!-- Tombol 3: INSTAGRAM -->
                <!-- Border Putih di Belakang -->
                <a-plane width="0.94" height="0.32" color="#ffffff" position="1.05 -1.05 0.005"></a-plane>
                <!-- Tombol Utama -->
                <a-plane 
                    class="clickable" 
                    id="btn-instagram" 
                    data-url="https://www.instagram.com/frmshbi/" 
                    width="0.9" 
                    height="0.28" 
                    color="#ff0022" 
                    position="1.05 -1.05 0.01">
                </a-plane>
                <a-text 
                    value="INSTAGRAM" 
                    align="center" 
                    width="2.3" 
                    color="#ffffff" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json" 
                    position="1.05 -1.05 0.02"
                    class="clickable"
                    data-url="https://www.instagram.com/frmshbi/">
                </a-text>

            </a-entity>
            
        </a-marker>

        <!-- Kamera Scene AR -->
        <a-entity camera></a-entity>
        
    </a-scene>

    <!-- Floating UI Status Bar (2D Overlay) -->
    <div id="status-bar" class="status-searching">
        <div class="status-indicator"></div>
        <span id="status-text">Mencari marker...</span>
    </div>

    <!-- Petunjuk Kamera untuk User -->
    <div id="instruction-overlay">
        Arahkan kamera ke <strong>Pattern Marker</strong> Anda
    </div>

    <!-- Script JS Kustom untuk Logika UI -->
    <script src="js/main.js"></script>
</body>
</html>
