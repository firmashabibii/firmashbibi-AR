<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Nama Interaktif WebAR</title>
    
    <!-- Link Font Google (Outfit & Plus Jakarta Sans) untuk Tampilan Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    

    <!-- Framework A-Frame (Versi stabil untuk AR.js) -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    
    <!-- Framework AR.js untuk A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- A-Frame Look-At Component untuk animasi model 3D mengejar kamera -->
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <!-- File CSS Kustom -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="margin: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif;">

    <!-- Kursor Visual 2D Premium di Tengah Layar (Cyberpunk HUD Style) -->
    <div id="css-cursor"></div>

    <!-- Overlay HTML Biodata Premium (HUD Sebelah Kiri - Menetap Diam & 100% Clickable Responsif) -->
    <div id="biodata-overlay" class="hidden">
        <!-- Bagian Foto Profil -->
        <div class="profile-header">
            <div class="profile-img-container">
                <img src="profile_rounded.png" id="profile-img" alt="Profile">
            </div>
        </div>
        
        <!-- 5 Baris Strip Biodata Monokrom -->
        <div class="bio-strip-container">
            <div class="bio-strip">
                <span class="bio-label">FULL NAME //</span>
                <span class="bio-value">FIRMAS HABIBI</span>
            </div>
            <div class="bio-strip">
                <span class="bio-label">ROLE //</span>
                <span class="bio-value">FULLSTACK ENGINEER</span>
            </div>
            <div class="bio-strip">
                <span class="bio-label">CORE STACK //</span>
                <span class="bio-value">REACT - NODE.JS</span>
            </div>
            <div class="bio-strip">
                <span class="bio-label">LOCATION //</span>
                <span class="bio-value">INDONESIA - SUMATERA UTARA</span>
            </div>
            <div class="bio-strip">
                <span class="bio-label">FOCUS //</span>
                <span class="bio-value">HIGH-PERFORMANCE SYSTEMS</span>
            </div>
        </div>
        
        <!-- 3 Tombol Link Sosial Media (HTML Asli Clickable) -->
        <div class="bio-buttons">
            <a href="https://www.frmshbi.dev/" target="_blank" class="bio-btn" id="btn-portfolio">
                PORTFOLIO
                <span class="tooltip">frmshbi.dev</span>
            </a>
            <a href="https://github.com/firmashabibii" target="_blank" class="bio-btn" id="btn-github">
                GITHUB
                <span class="tooltip">github.com/firmashabibii</span>
            </a>
            <a href="https://www.instagram.com/frmshbi/" target="_blank" class="bio-btn" id="btn-instagram">
                INSTAGRAM
                <span class="tooltip">instagram.com/frmshbi</span>
            </a>
        </div>
    </div>

    <!-- Scene AR.js -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; videoParameters: { facingMode: 'environment' }; debugUIEnabled: false; smooth: true; smoothCount: 10; smoothTolerance: 0.02; smoothThreshold: 5;" 
        vr-mode-ui="enabled: false"
        renderer="antialias: true; colorManagement: true; sortObjects: true;">
        
        <!-- Prapemuatan Model 3D -->
        <a-assets>
            <a-asset-item id="monster-model" src="monster_eye.glb"></a-asset-item>
        </a-assets>
        
        <!-- Kamera Scene AR -->
        <a-entity id="main-camera" camera cursor="rayOrigin: mouse" raycaster="objects: .clickable; interval: 100;"></a-entity>
        
        <!-- Custom Marker -->
        <!-- 
          type="pattern": Menggunakan pattern marker khusus (.patt).
          url="pattern-pening.patt": Mengarah ke file marker kustom di root proyek.
          id="custom-marker": Digunakan oleh JS untuk mendeteksi event markerFound/markerLost.
        -->
        <a-marker type="pattern" url="pattern-pening.patt" id="custom-marker" smooth="true" smoothCount="15" smoothTolerance="0.01" smoothThreshold="5">
            
            <!-- === MODEL 3D MATA MONSTER PROSEDURAL (Melayang di Atas Marker & Melirik Mengejar Kamera) === -->
            <a-entity class="entrance-element" scale="0 0 0" animation="property: scale; to: 1.2 1.2 1.2; dur: 800; easing: easeOutBack; startEvents: show-element">
                <!-- Entitas yang melacak arah kamera luar (look-at) secara real-world -->
                <a-entity position="0 0.5 0" look-at="#main-camera">
                    <a-sphere color="#0c0c0c" radius="0.36" material="shader: flat;"></a-sphere>
                    <a-sphere color="#ffffff" radius="0.35" material="shader: flat;"></a-sphere>
                    <a-sphere color="#ff0022" radius="0.14" position="0 0 0.28" material="shader: flat;"></a-sphere>
                    <a-sphere color="#000000" radius="0.06" position="0 0 0.38" material="shader: flat;"></a-sphere>
                    <a-sphere color="#ffffff" radius="0.02" position="0.06 0.06 0.40" material="shader: flat;"></a-sphere>
                </a-entity>
            </a-entity>
            
        </a-marker>
    </a-scene>

    <!-- Floating UI Status Bar (2D Overlay) -->
    <div id="status-bar" class="status-searching">
        <div class="status-indicator"></div>
        <span id="status-text">Mencari marker...</span>
    </div>

    <!-- Petunjuk Kamera untuk User -->
    <div id="instruction-overlay">
        Arahkan kamera ke <strong>Pattern Marker</strong> Anda
    </div>

    <!-- Script JS Kustom untuk Logika UI -->
    <script src="js/main.js"></script>
</body>
</html>
