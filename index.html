<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Nama Interaktif WebAR</title>
    
    <!-- Link Font Google (Outfit & Plus Jakarta Sans) untuk Tampilan Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Framework A-Frame (Versi stabil untuk AR.js) -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    
    <!-- Framework AR.js untuk A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- File CSS Kustom -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="margin: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif;">

    <!-- Scene AR.js -->
    <!-- 
      embedded: Memungkinkan scene berada di dalam layout HTML.
      arjs: Konfigurasi sumber webcam dan menghilangkan debug UI bawaan AR.js agar lebih bersih.
      vr-mode-ui: Dinonaktifkan karena kita menggunakan AR genggam/webcam, bukan VR headset.
    -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; smooth: true; smoothCount: 10; smoothTolerance: 0.02; smoothThreshold: 5;" 
        vr-mode-ui="enabled: false"
        renderer="antialias: true; colorManagement: true; sortObjects: true;">
        
        <!-- Custom Marker -->
        <!-- 
          type="pattern": Menggunakan pattern marker khusus (.patt).
          url="pattern-pening.patt": Mengarah ke file marker kustom di root proyek.
          id="custom-marker": Digunakan oleh JS untuk mendeteksi event markerFound/markerLost.
        -->
        <a-marker type="pattern" url="pattern-pening.patt" id="custom-marker">
            
            <!-- Grup Konten AR (Digeser 2.2 unit ke kanan agar melayang di samping marker, tidak menumpuk di atasnya) -->
            <!-- 
              position: Posisi awal melayang di samping kanan marker (X = 2.2).
              rotation: Kemiringan -60 derajat di sumbu X agar miring menghadap kamera user.
              animation: Animasi melayang (levitasi) naik-turun lebih dramatis (rentang 20cm).
            -->
            <a-entity 
                id="ar-content"
                position="3.0 0.5 0" 
                rotation="-60 0 0"
                animation="property: position; to: 3.0 0.7 0; dir: alternate; loop: true; dur: 2500; easing: easeInOutSine">

                <!-- === FOTO PROFIL CYBERPUNK (MELAYANG DI SEBELAH KIRI - BERSUDUT MELENGKUNG HALUS 15PX) === -->
                <!-- Gambar Foto Profil Bersudut Bulat (Tanpa Border Merah) -->
                <a-entity class="entrance-element" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 700; easing: easeOutBack; startEvents: show-element">
                    <a-image src="profile_rounded.png" width="1.0" height="1.3" position="-1.2 0 0" material="shader: flat; transparent: true;"></a-image>
                </a-entity>

                <!-- === 5 BARIS PENJELASAN BIODATA (STRIP HITAM POLOS MELAYANG DENGAN BORDER RADIUS 15PX) === -->
                
                <!-- Baris 1: FULL NAME -->
                <a-entity class="entrance-element" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 500; easing: easeOutBack; startEvents: show-element">
                    <!-- Strip Utama Gelap (SVG Rounded rx="15") -->
                    <a-plane src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='512' height='64'><rect width='512' height='64' rx='15' fill='rgba(12,12,12,0.95)'/></svg>" width="2.1" height="0.18" position="0.8 0.52 0" material="shader: flat; transparent: true;"></a-plane>
                    <!-- Label (Abu-abu) & Value (Putih) -->
                    <a-text value="FULL NAME //" color="#b0b0b0" width="1.6" position="-0.1 0.52 0.01" anchor="left" font="exo2bold"></a-text>
                    <a-text value="FIRMAS HABIBI" color="#ffffff" width="1.8" position="0.6 0.52 0.01" anchor="left" font="exo2bold"></a-text>
                </a-entity>

                <!-- Baris 2: ROLE -->
                <a-entity class="entrance-element" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 500; easing: easeOutBack; startEvents: show-element">
                    <a-plane src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='512' height='64'><rect width='512' height='64' rx='15' fill='rgba(12,12,12,0.95)'/></svg>" width="2.1" height="0.18" position="0.8 0.26 0" material="shader: flat; transparent: true;"></a-plane>
                    <a-text value="ROLE //" color="#b0b0b0" width="1.6" position="-0.1 0.26 0.01" anchor="left" font="exo2bold"></a-text>
                    <a-text value="FULLSTACK ENGGINEER" color="#ffffff" width="1.8" position="0.6 0.26 0.01" anchor="left" font="exo2bold"></a-text>
                </a-entity>

                <!-- Baris 3: CORE STACK -->
                <a-entity class="entrance-element" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 500; easing: easeOutBack; startEvents: show-element">
                    <a-plane src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='512' height='64'><rect width='512' height='64' rx='15' fill='rgba(12,12,12,0.95)'/></svg>" width="2.1" height="0.18" position="0.8 0.00 0" material="shader: flat; transparent: true;"></a-plane>
                    <a-text value="CORE STACK //" color="#b0b0b0" width="1.6" position="-0.1 0.00 0.01" anchor="left" font="exo2bold"></a-text>
                    <a-text value="REACT - NODE.JS" color="#ffffff" width="1.8" position="0.6 0.00 0.01" anchor="left" font="exo2bold"></a-text>
                </a-entity>

                <!-- Baris 4: LOCATION -->
                <a-entity class="entrance-element" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 500; easing: easeOutBack; startEvents: show-element">
                    <a-plane src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='512' height='64'><rect width='512' height='64' rx='15' fill='rgba(12,12,12,0.95)'/></svg>" width="2.1" height="0.18" position="0.8 -0.26 0" material="shader: flat; transparent: true;"></a-plane>
                    <a-text value="LOCATION //" color="#b0b0b0" width="1.6" position="-0.1 -0.26 0.01" anchor="left" font="exo2bold"></a-text>
                    <a-text value="INDONESIA - SUMATERA UTARA" color="#ffffff" width="1.8" position="0.6 -0.26 0.01" anchor="left" font="exo2bold"></a-text>
                </a-entity>

                <!-- Baris 5: FOCUS -->
                <a-entity class="entrance-element" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 500; easing: easeOutBack; startEvents: show-element">
                    <a-plane src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='512' height='64'><rect width='512' height='64' rx='15' fill='rgba(12,12,12,0.95)'/></svg>" width="2.1" height="0.18" position="0.8 -0.52 0" material="shader: flat; transparent: true;"></a-plane>
                    <a-text value="FOCUS //" color="#b0b0b0" width="1.6" position="-0.1 -0.52 0.01" anchor="left" font="exo2bold"></a-text>
                    <a-text value="HIGH-PERFORMANCE SYSTEMS" color="#ffffff" width="1.8" position="0.6 -0.52 0.01" anchor="left" font="exo2bold"></a-text>
                </a-entity>


                <!-- === TOMBOL TAUTAN INTERAKTIF (HITAM POLOS DENGAN BORDER RADIUS 15PX) === -->

                <!-- Tombol 1: PORTFOLIO -->
                <a-entity class="entrance-element" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack; startEvents: show-element">
                    <!-- Tombol Utama (SVG Rounded rx="15") -->
                    <a-plane 
                        class="clickable" 
                        id="btn-portfolio" 
                        data-url="https://www.frmshbi.dev/" 
                        width="0.9" 
                        height="0.28" 
                        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='80'><rect width='256' height='80' rx='15' fill='rgba(12,12,12,0.95)'/></svg>"
                        position="-1.05 -1.15 0"
                        material="shader: flat; transparent: true;">
                    </a-plane>
                    <!-- Teks Tombol (Menggunakan Font Default A-Frame agar Bebas CORS Error) -->
                    <a-text 
                        value="PORTFOLIO" 
                        align="center" 
                        width="2.1" 
                        color="#ffffff" 
                        position="-1.05 -1.15 0.01"
                        class="clickable"
                        data-url="https://www.frmshbi.dev/"
                        font="exo2bold">
                    </a-text>
                </a-entity>

                <!-- Tombol 2: GITHUB -->
                <a-entity class="entrance-element" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack; startEvents: show-element">
                    <a-plane 
                        class="clickable" 
                        id="btn-github" 
                        data-url="https://github.com/firmashabibii" 
                        width="0.9" 
                        height="0.28" 
                        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='80'><rect width='256' height='80' rx='15' fill='rgba(12,12,12,0.95)'/></svg>"
                        position="0 -1.15 0"
                        material="shader: flat; transparent: true;">
                    </a-plane>
                    <!-- Teks Tombol (Menggunakan Font Default A-Frame agar Bebas CORS Error) -->
                    <a-text 
                        value="GITHUB" 
                        align="center" 
                        width="2.1" 
                        color="#ffffff" 
                        position="0 -1.15 0.01"
                        class="clickable"
                        data-url="https://github.com/firmashabibii"
                        font="exo2bold">
                    </a-text>
                </a-entity>

                <!-- Tombol 3: INSTAGRAM -->
                <a-entity class="entrance-element" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack; startEvents: show-element">
                    <a-plane 
                        class="clickable" 
                        id="btn-instagram" 
                        data-url="https://www.instagram.com/frmshbi/" 
                        width="0.9" 
                        height="0.28" 
                        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='80'><rect width='256' height='80' rx='15' fill='rgba(12,12,12,0.95)'/></svg>"
                        position="1.05 -1.15 0"
                        material="shader: flat; transparent: true;">
                    </a-plane>
                    <!-- Teks Tombol (Menggunakan Font Default A-Frame agar Bebas CORS Error) -->
                    <a-text 
                        value="INSTAGRAM" 
                        align="center" 
                        width="2.1" 
                        color="#ffffff" 
                        position="1.05 -1.15 0.01"
                        class="clickable"
                        data-url="https://www.instagram.com/frmshbi/"
                        font="exo2bold">
                    </a-text>
                </a-entity>

            </a-entity>
            
        </a-marker>

        <!-- Kamera Scene AR dengan Cursor Raycast terintegrasi agar stabil di mobile -->
        <a-entity camera cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
        
    </a-scene>

    <!-- Floating UI Status Bar (2D Overlay) -->
    <div id="status-bar" class="status-searching">
        <div class="status-indicator"></div>
        <span id="status-text">Mencari marker...</span>
    </div>

    <!-- Petunjuk Kamera untuk User -->
    <div id="instruction-overlay">
        Arahkan kamera ke <strong>Pattern Marker</strong> Anda
    </div>

    <!-- Script JS Kustom untuk Logika UI -->
    <script src="js/main.js"></script>
</body>
</html>
