<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Nama Interaktif WebAR</title>
    
    <!-- Link Font Google (Outfit & Plus Jakarta Sans) untuk Tampilan Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Framework A-Frame (Versi stabil untuk AR.js) -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    
    <!-- Framework AR.js untuk A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- File CSS Kustom -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="margin: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif;">

    <!-- Scene AR.js -->
    <!-- 
      embedded: Memungkinkan scene berada di dalam layout HTML.
      arjs: Konfigurasi sumber webcam dan menghilangkan debug UI bawaan AR.js agar lebih bersih.
      vr-mode-ui: Dinonaktifkan karena kita menggunakan AR genggam/webcam, bukan VR headset.
    -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; precision: medium; antialias: true;">
        
        <!-- Asset Management System untuk efisiensi pemuatan aset -->
        <a-assets>
            <!-- Model 3D GLTF (Damaged Helmet sebagai model default yang futuristik & premium) -->
            <!-- Anda bisa mengganti URL src ini dengan file lokal Anda, misal: "assets/laptop.gltf" -->
            <a-asset-item id="model-3d" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb"></a-asset-item>
        </a-assets>

        <!-- Custom Marker -->
        <!-- 
          type="pattern": Menggunakan pattern marker khusus (.patt).
          url="pattern-pening.patt": Mengarah ke file marker kustom di root proyek.
          id="custom-marker": Digunakan oleh JS untuk mendeteksi event markerFound/markerLost.
        -->
        <a-marker type="pattern" url="pattern-pening.patt" id="custom-marker">
            
            <!-- Elemen Model 3D GLTF -->
            <!-- 
              gltf-model: Mereferensikan id aset (#model-3d).
              position: Dimajukan ke depan (z = 0.5) agar tidak bertabrakan dengan panel biodata di belakangnya.
              scale: Diatur sedikit lebih kompak agar komposisi visual seimbang.
              animation: Animasi berputar dan levitasi.
            -->
            <a-gltf-model 
                src="#model-3d" 
                position="0 0.4 0.5" 
                scale="0.45 0.45 0.45"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
                animation__hover="property: position; to: 0 0.55 0.5; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine">
            </a-gltf-model>

            <!-- Kartu Biodata 3D Mengambang (Sesuai Gambar Referensi Cyberpunk) -->
            <!-- 
              position: Diletakkan miring berdiri di belakang model GLTF.
              rotation: Kemiringan -60 derajat di sumbu X agar menghadap ke arah kamera user dengan nyaman.
              animation: Efek melayang (levitasi) naik-turun yang halus secara berulang.
            -->
            <a-entity 
                id="biodata-card" 
                position="0 0.7 -0.3" 
                rotation="-60 0 0"
                animation="property: position; to: 0 0.75 -0.3; dir: alternate; loop: true; dur: 3000; easing: easeInOutSine">
                
                <!-- Panel Belakang (Glow Border Merah) -->
                <!-- Lebih besar sedikit dari panel utama untuk menciptakan efek border merah menyala -->
                <a-plane 
                    width="3.44" 
                    height="1.84" 
                    color="#ff0022" 
                    position="0 0 0" 
                    material="roughness: 1; metalness: 0.1">
                </a-plane>
                
                <!-- Panel Utama (Latar Belakang Hitam Pekat) -->
                <a-plane 
                    width="3.4" 
                    height="1.8" 
                    color="#0a0a0a" 
                    position="0 0 0.01" 
                    material="roughness: 0.8; metalness: 0.2">
                </a-plane>

                <!-- Frame Foto Profil (Border Merah) -->
                <a-plane 
                    width="1.06" 
                    height="1.26" 
                    color="#ff0022" 
                    position="-1.0 0 0.02">
                </a-plane>

                <!-- Foto Profil Pengembang -->
                <!-- Memuat berkas gambar profile.png yang telah disiapkan -->
                <a-image 
                    src="profile.png" 
                    width="1.0" 
                    height="1.2" 
                    position="-1.0 0 0.03"
                    material="alphaTest: 0.5">
                </a-image>

                <!-- === HEADER KARTU BIODATA === -->
                <!-- "// BIODATA" -->
                <a-text 
                    value="// BIODATA" 
                    color="#ff0022" 
                    width="3.2" 
                    position="-1.5 0.75 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>

                <!-- "ID_FRM205" -->
                <a-text 
                    value="ID_FRM205" 
                    color="#ff0022" 
                    width="2.5" 
                    position="1.5 0.75 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    align="right"
                    anchor="right">
                </a-text>

                <!-- Garis Horizontal Pemisah (Gaya Futuristik/Cyberpunk) -->
                <a-plane 
                    width="3.0" 
                    height="0.01" 
                    color="#ff0022" 
                    position="0 0.62 0.02">
                </a-plane>

                <!-- === DATA DETAIL (LABEL & NAMA) === -->

                <!-- Baris 1: FULL NAME -->
                <a-text 
                    value="FULL NAME //" 
                    color="#ff0022" 
                    width="2.0" 
                    position="-0.3 0.4 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>
                <a-text 
                    value="FIRMAS HABIBI" 
                    color="#ffffff" 
                    width="2.2" 
                    position="0.3 0.4 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>

                <!-- Baris 2: ROLE -->
                <a-text 
                    value="ROLE //" 
                    color="#ff0022" 
                    width="2.0" 
                    position="-0.3 0.15 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>
                <a-text 
                    value="FULLSTACK ENGGINEER" 
                    color="#ffffff" 
                    width="2.2" 
                    position="0.3 0.15 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>

                <!-- Baris 3: CORE STACK -->
                <a-text 
                    value="CORE STACK //" 
                    color="#ff0022" 
                    width="2.0" 
                    position="-0.3 -0.1 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>
                <a-text 
                    value="REACT - NODE.JS" 
                    color="#ffffff" 
                    width="2.2" 
                    position="0.3 -0.1 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>

                <!-- Baris 4: LOCATION -->
                <a-text 
                    value="LOCATION //" 
                    color="#ff0022" 
                    width="2.0" 
                    position="-0.3 -0.35 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>
                <a-text 
                    value="INDONESIA - SUMATERA UTARA" 
                    color="#ffffff" 
                    width="2.2" 
                    position="0.3 -0.35 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>

                <!-- Baris 5: FOCUS -->
                <a-text 
                    value="FOCUS //" 
                    color="#ff0022" 
                    width="2.0" 
                    position="-0.3 -0.6 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>
                <a-text 
                    value="HIGH-PERFORMANCE SYSTEMS &" 
                    color="#ffffff" 
                    width="2.2" 
                    position="0.3 -0.55 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>
                <a-text 
                    value="INTERACTIVE APPS" 
                    color="#ffffff" 
                    width="2.2" 
                    position="0.3 -0.72 0.02" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
                    anchor="left">
                </a-text>

            </a-entity>
            
        </a-marker>

        <!-- Kamera Scene AR -->
        <a-entity camera></a-entity>
        
    </a-scene>

    <!-- Floating UI Status Bar (2D Overlay) -->
    <div id="status-bar" class="status-searching">
        <div class="status-indicator"></div>
        <span id="status-text">Mencari marker...</span>
    </div>

    <!-- Petunjuk Kamera untuk User -->
    <div id="instruction-overlay">
        Arahkan kamera ke <strong>Pattern Marker</strong> Anda
    </div>

    <!-- Script JS Kustom untuk Logika UI -->
    <script src="js/main.js"></script>
</body>
</html>
