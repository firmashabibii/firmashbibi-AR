<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Nama Interaktif WebAR</title>
    
    <!-- Link Font Google (Outfit & Plus Jakarta Sans) untuk Tampilan Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Framework A-Frame (Versi stabil untuk AR.js) -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    
    <!-- Framework AR.js untuk A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- File CSS Kustom -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="margin: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif;">

    <!-- Scene AR.js -->
    <!-- 
      embedded: Memungkinkan scene berada di dalam layout HTML.
      arjs: Konfigurasi sumber webcam dan menghilangkan debug UI bawaan AR.js agar lebih bersih.
      vr-mode-ui: Dinonaktifkan karena kita menggunakan AR genggam/webcam, bukan VR headset.
    -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        vr-mode-ui="enabled: false"
        renderer="antialias: true; colorManagement: true; sortObjects: true;">
        
        <!-- Asset Management System untuk mendefinisikan tekstur tombol rounded rect dan strip -->
        <a-assets>
            <canvas id="button-bg-canvas" width="256" height="80"></canvas>
            <canvas id="button-border-canvas" width="264" height="88"></canvas>
            <canvas id="strip-bg-canvas" width="512" height="64"></canvas>
            <canvas id="strip-border-canvas" width="520" height="72"></canvas>
        </a-assets>

        <!-- Custom Marker -->
        <!-- 
          type="pattern": Menggunakan pattern marker khusus (.patt).
          url="pattern-pening.patt": Mengarah ke file marker kustom di root proyek.
          id="custom-marker": Digunakan oleh JS untuk mendeteksi event markerFound/markerLost.
        -->
        <a-marker type="pattern" url="pattern-pening.patt" id="custom-marker">
            
            <!-- Grup Konten AR (Melayang Bersama secara Elegan) -->
            <!-- 
              position: Posisi awal melayang di atas marker.
              rotation: Kemiringan -60 derajat di sumbu X agar miring menghadap kamera user.
              animation: Animasi melayang (levitasi) naik-turun lebih dramatis (rentang 20cm).
            -->
            <a-entity 
                id="ar-content"
                position="0 0.5 0" 
                rotation="-60 0 0"
                animation="property: position; to: 0 0.7 0; dir: alternate; loop: true; dur: 2500; easing: easeInOutSine">

                <!-- === FOTO PROFIL CYBERPUNK (MELAYANG MANDIRI DI SEBELAH KIRI - FORMAT PORTRAIT 3:4) === -->
                <!-- Border Merah Foto -->
                <a-plane width="1.06" height="1.36" color="#ff0022" position="-1.0 0 0" material="shader: flat;"></a-plane>
                <!-- Gambar Foto Profil -->
                <a-image src="profile.jpg" width="1.0" height="1.3" position="-1.0 0 0.01" material="shader: flat;"></a-image>

                <!-- === 5 BARIS PENJELASAN BIODATA (STRIP MELAYANG SATU PER SATU DENGAN TEKS VEKTOR SDF TAJAM) === -->
                
                <!-- Baris 1: FULL NAME -->
                <!-- Border Merah Strip -->
                <a-plane src="#strip-border-canvas" width="2.14" height="0.22" position="0.65 0.52 0.005" material="shader: flat; transparent: true;"></a-plane>
                <!-- Strip Utama Gelap -->
                <a-plane src="#strip-bg-canvas" width="2.1" height="0.18" position="0.65 0.52 0.01" material="shader: flat; transparent: true; opacity: 0.9;"></a-plane>
                <!-- Label & Value -->
                <a-text value="FULL NAME //" color="#ff0022" width="1.6" position="-0.25 0.52 0.02" anchor="left"></a-text>
                <a-text value="FIRMAS HABIBI" color="#ffffff" width="1.8" position="0.35 0.52 0.02" anchor="left"></a-text>

                <!-- Baris 2: ROLE -->
                <a-plane src="#strip-border-canvas" width="2.14" height="0.22" position="0.65 0.26 0.005" material="shader: flat; transparent: true;"></a-plane>
                <a-plane src="#strip-bg-canvas" width="2.1" height="0.18" position="0.65 0.26 0.01" material="shader: flat; transparent: true; opacity: 0.9;"></a-plane>
                <a-text value="ROLE //" color="#ff0022" width="1.6" position="-0.25 0.26 0.02" anchor="left"></a-text>
                <a-text value="FULLSTACK ENGGINEER" color="#ffffff" width="1.8" position="0.35 0.26 0.02" anchor="left"></a-text>

                <!-- Baris 3: CORE STACK -->
                <a-plane src="#strip-border-canvas" width="2.14" height="0.22" position="0.65 0.00 0.005" material="shader: flat; transparent: true;"></a-plane>
                <a-plane src="#strip-bg-canvas" width="2.1" height="0.18" position="0.65 0.00 0.01" material="shader: flat; transparent: true; opacity: 0.9;"></a-plane>
                <a-text value="CORE STACK //" color="#ff0022" width="1.6" position="-0.25 0.00 0.02" anchor="left"></a-text>
                <a-text value="REACT - NODE.JS" color="#ffffff" width="1.8" position="0.35 0.00 0.02" anchor="left"></a-text>

                <!-- Baris 4: LOCATION -->
                <a-plane src="#strip-border-canvas" width="2.14" height="0.22" position="0.65 -0.26 0.005" material="shader: flat; transparent: true;"></a-plane>
                <a-plane src="#strip-bg-canvas" width="2.1" height="0.18" position="0.65 -0.26 0.01" material="shader: flat; transparent: true; opacity: 0.9;"></a-plane>
                <a-text value="LOCATION //" color="#ff0022" width="1.6" position="-0.25 -0.26 0.02" anchor="left"></a-text>
                <a-text value="INDONESIA - SUMATERA UTARA" color="#ffffff" width="1.8" position="0.35 -0.26 0.02" anchor="left"></a-text>

                <!-- Baris 5: FOCUS -->
                <a-plane src="#strip-border-canvas" width="2.14" height="0.22" position="0.65 -0.52 0.005" material="shader: flat; transparent: true;"></a-plane>
                <a-plane src="#strip-bg-canvas" width="2.1" height="0.18" position="0.65 -0.52 0.01" material="shader: flat; transparent: true; opacity: 0.9;"></a-plane>
                <a-text value="FOCUS //" color="#ff0022" width="1.6" position="-0.25 -0.52 0.02" anchor="left"></a-text>
                <a-text value="HIGH-PERFORMANCE SYSTEMS" color="#ffffff" width="1.8" position="0.35 -0.52 0.02" anchor="left"></a-text>


                <!-- === TOMBOL TAUTAN INTERAKTIF (SUDUT BULAT) === -->

                <!-- Tombol 1: PORTFOLIO -->
                <!-- Border Merah Menyala Bulat -->
                <a-plane src="#button-border-canvas" width="0.94" height="0.32" position="-1.05 -1.15 0.005" material="shader: flat; transparent: true;"></a-plane>
                <!-- Tombol Utama (Glassmorphism Gelap Bulat) -->
                <a-plane 
                    class="clickable" 
                    id="btn-portfolio" 
                    data-url="https://www.frmshbi.dev/" 
                    width="0.9" 
                    height="0.28" 
                    src="#button-bg-canvas"
                    position="-1.05 -1.15 0.01"
                    material="shader: flat; opacity: 0.95; transparent: true;">
                </a-plane>
                <!-- Teks Tombol (Menggunakan Font Default A-Frame agar Bebas CORS Error) -->
                <a-text 
                    value="PORTFOLIO" 
                    align="center" 
                    width="2.1" 
                    color="#ffffff" 
                    position="-1.05 -1.15 0.05"
                    class="clickable"
                    data-url="https://www.frmshbi.dev/">
                </a-text>

                <!-- Tombol 2: GITHUB -->
                <!-- Border Merah Menyala Bulat -->
                <a-plane src="#button-border-canvas" width="0.94" height="0.32" position="0 -1.15 0.005" material="shader: flat; transparent: true;"></a-plane>
                <!-- Tombol Utama (Glassmorphism Gelap Bulat) -->
                <a-plane 
                    class="clickable" 
                    id="btn-github" 
                    data-url="https://github.com/firmashabibii" 
                    width="0.9" 
                    height="0.28" 
                    src="#button-bg-canvas"
                    position="0 -1.15 0.01"
                    material="shader: flat; opacity: 0.95; transparent: true;">
                </a-plane>
                <!-- Teks Tombol (Menggunakan Font Default A-Frame agar Bebas CORS Error) -->
                <a-text 
                    value="GITHUB" 
                    align="center" 
                    width="2.1" 
                    color="#ffffff" 
                    position="0 -1.15 0.05"
                    class="clickable"
                    data-url="https://github.com/firmashabibii">
                </a-text>

                <!-- Tombol 3: INSTAGRAM -->
                <!-- Border Merah Menyala Bulat -->
                <a-plane src="#button-border-canvas" width="0.94" height="0.32" position="1.05 -1.15 0.005" material="shader: flat; transparent: true;"></a-plane>
                <!-- Tombol Utama (Glassmorphism Gelap Bulat) -->
                <a-plane 
                    class="clickable" 
                    id="btn-instagram" 
                    data-url="https://www.instagram.com/frmshbi/" 
                    width="0.9" 
                    height="0.28" 
                    src="#button-bg-canvas"
                    position="1.05 -1.15 0.01"
                    material="shader: flat; opacity: 0.95; transparent: true;">
                </a-plane>
                <!-- Teks Tombol (Menggunakan Font Default A-Frame agar Bebas CORS Error) -->
                <a-text 
                    value="INSTAGRAM" 
                    align="center" 
                    width="2.1" 
                    color="#ffffff" 
                    position="1.05 -1.15 0.05"
                    class="clickable"
                    data-url="https://www.instagram.com/frmshbi/">
                </a-text>

            </a-entity>
            
        </a-marker>

        <!-- Kamera Scene AR dengan Cursor Raycast terintegrasi agar stabil di mobile -->
        <a-entity camera cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
        
    </a-scene>

    <!-- Floating UI Status Bar (2D Overlay) -->
    <div id="status-bar" class="status-searching">
        <div class="status-indicator"></div>
        <span id="status-text">Mencari marker...</span>
    </div>

    <!-- Petunjuk Kamera untuk User -->
    <div id="instruction-overlay">
        Arahkan kamera ke <strong>Pattern Marker</strong> Anda
    </div>

    <!-- Script JS Kustom untuk Logika UI -->
    <script src="js/main.js"></script>
</body>
</html>
